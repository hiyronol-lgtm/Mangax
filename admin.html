<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mangax Admin - لوحة التحكم</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --accent:#22c55e;--accent-dark:#15803d;--accent-soft:rgba(34,197,94,.15);
  --bg:#0b0c0d;--bg2:#141517;--card:#1a1b1e;--card2:#202226;
  --text:#f3f4f6;--muted:#9aa0a6;--border:#2a2c30;--danger:#ef4444;--warn:#f59e0b;--gold:#eab308;
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;}
a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;border:none;}
input,select,textarea{font-family:inherit;} img{max-width:100%;display:block;}
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
#wrap{max-width:1200px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:30;}
.brand{display:flex;align-items:center;gap:8px;font-weight:900;font-size:18px;}
.brand i{color:var(--accent);font-size:22px;}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:18px;}
#app{padding:16px;min-height:80vh;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:var(--radius-sm);background:var(--accent);color:#06140a;font-weight:800;font-size:13.5px;}
.btn.outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn.danger{background:var(--danger);color:#fff;}
.btn.ghost{background:var(--card);color:var(--text);}
.btn.gold{background:linear-gradient(90deg,var(--gold),#fbbf24);color:#3a2a00;}
.btn.warn{background:var(--warn);color:#fff;}
.btn.sm{padding:7px 12px;font-size:12px;}
.btn[disabled]{opacity:.5;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;}
.input-wrap{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;}
.input-wrap input,.input-wrap select{flex:1;background:transparent;border:none;color:var(--text);padding:12px 8px;font-size:14px;outline:none;}
textarea.ta{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px;font-size:14px;outline:none;resize:vertical;min-height:80px;}
.grid{display:grid;gap:14px;}
.grid-stats{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
.grid-charts{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
.card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);}
.stat-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);}
.stat-card i{font-size:22px;color:var(--accent);margin-bottom:8px;}
.stat-card .num{font-size:24px;font-weight:900;}
.stat-card .lbl{font-size:12px;color:var(--muted);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:10px 8px;text-align:right;border-bottom:1px solid var(--border);}
th{color:var(--muted);font-size:12px;font-weight:700;}
tr:hover td{background:var(--card2);}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:700;padding:4px 9px;border-radius:14px;}
.chip.warn{background:rgba(245,158,11,.15);color:var(--warn);}
.chip.danger{background:rgba(239,68,68,.15);color:var(--danger);}
.chip.gray{background:var(--card2);color:var(--muted);}
.chip.gold{background:rgba(234,179,8,.15);color:var(--gold);}
.badge{display:inline-flex;align-items:center;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:8px;color:#06140a;vertical-align:middle;}
.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title h2{font-size:18px;margin:0;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;}
.menu-tile{background:var(--card);border-radius:14px;padding:18px 12px;text-align:center;border:1px solid var(--border);}
.menu-tile i{font-size:26px;color:var(--accent);margin-bottom:8px;display:block;}
.menu-tile span{font-size:12.5px;font-weight:700;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--bg2);border-radius:18px;padding:20px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-box h3{margin:0 0 16px;font-size:16px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2023;color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;z-index:300;}
.row{display:flex;align-items:center;gap:8px;}
.between{justify-content:space-between;}
.muted{color:var(--muted);}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state i{font-size:50px;color:var(--accent);display:block;margin-bottom:10px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto;}
@keyframes sp{to{transform:rotate(360deg)}}
.drawer{position:fixed;top:0;right:0;bottom:0;width:290px;background:var(--bg2);z-index:250;transform:translateX(100%);transition:.25s;padding:18px;overflow-y:auto;}
.drawer.open{transform:translateX(0);}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:240;display:none;}
.drawer-overlay.show{display:block;}
.drawer a{display:flex;align-items:center;gap:12px;padding:13px 10px;border-radius:10px;font-size:14px;font-weight:600;}
.drawer a:hover{background:var(--card);}
.drawer a i{color:var(--accent);font-size:18px;}
.tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;}
.tab{padding:8px 16px;border-radius:18px;background:var(--card);color:var(--muted);font-size:12.5px;font-weight:700;white-space:nowrap;border:1px solid var(--border);}
.tab.active{background:var(--accent);color:#06140a;border-color:var(--accent);}
.drop-zone{border:2px dashed var(--border);border-radius:14px;padding:24px;text-align:center;cursor:pointer;transition:.2s;}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--accent-soft);}
.page-thumb{position:relative;display:inline-block;}
.page-thumb img{width:80px;height:110px;object-fit:cover;border-radius:8px;}
.page-thumb .rm{position:absolute;top:-6px;left:-6px;width:20px;height:20px;border-radius:50%;background:var(--danger);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}
.sortable-pages{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.color-dot{width:28px;height:28px;border-radius:50%;display:inline-block;cursor:pointer;border:2px solid transparent;}
.color-dot.active{border-color:#fff;}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <div class="brand"><i class="ri-book-read-fill"></i> Mangax Admin</div>
    <div class="row">
      <span id="admin-pts" style="display:none;background:rgba(234,179,8,.15);color:var(--gold);font-size:12.5px;font-weight:800;padding:6px 12px;border-radius:20px"></span>
      <button class="icon-btn" onclick="toggleDrawer()"><i class="ri-menu-line"></i></button>
    </div>
  </div>
  <div id="app"></div>
</div>
<div class="drawer-overlay" id="drawer-overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// ===== UPDATED SUPABASE CREDENTIALS =====
const SUPABASE_URL = 'https://vwyambddhlgrgtqmxwik.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8jM7dTNHTs80u34uzVc3Kg_LUDFDW_A';
// =========================================

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const THEMES = {green:'#22c55e',blue:'#3b82f6',purple:'#a855f7',red:'#ef4444',orange:'#f97316',pink:'#ec4899',teal:'#14b8a6',gold:'#eab308'};
const TYPE_LABEL = {manga:'مانجا',manhwa:'مانهوا',manhua:'مانهوا صينية'};
const state = {user:null, profile:null};

function toast(msg){ const r=document.getElementById('toast-root'); const e=document.createElement('div'); e.className='toast'; e.textContent=msg; r.appendChild(e); setTimeout(()=>e.remove(),2400); }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&','<':'<','>':'>','"':'"',"'":'''}[c])); }
function go(r){ location.hash=r; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function openModal(html){ document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box">${html}</div></div>`; }
function toggleDrawer(){ const d=document.getElementById('drawer'); const o=document.getElementById('drawer-overlay'); if(!d.classList.contains('open')) renderDrawer(); d.classList.toggle('open'); o.classList.toggle('show'); }
function renderDrawer(){
  const items=[
    ['#/dashboard','ri-dashboard-3-line','الإحصائيات'],
    ['#/series','ri-book-2-line','إدارة الأعمال'],
    ['#/users','ri-team-line','إدارة المستخدمين'],
    ['#/subscription-requests','ri-vip-crown-2-line','طلبات الاشتراك'],
    ['#/plans','ri-price-tag-3-line','باقات الاشتراك'],
    ['#/points-requests','ri-coin-line','طلبات شراء النقاط'],
    ['#/points-manager','ri-exchange-funds-line','إدارة نقاط المستخدمين'],
    ['#/avatar-store','ri-user-star-line','متجر البروفيلات'],
    ['#/chapters-lock','ri-lock-2-line','قفل الفصول'],
    ['#/news','ri-newspaper-line','الأخبار'],
    ['#/polls','ri-bar-chart-box-line','التصويتات'],
    ['#/forum-admin','ri-discuss-line','إدارة المنتدى'],
    ['#/ads','ri-advertisement-line','أكواد الإعلانات'],
    ['#/direct-links','ri-link','الروابط المباشرة'],
    ['#/settings','ri-settings-3-line','الإعدادات'],
  ];
  document.getElementById('drawer').innerHTML=`<div class="row between" style="margin-bottom:18px"><b>القائمة</b><button class="icon-btn" onclick="toggleDrawer()"><i class="ri-close-line"></i></button></div>
  ${items.map(([r,i,l])=>`<a href="${r}" onclick="toggleDrawer()"><i class="${i}"></i>${l}</a>`).join('')}
  <div style="height:1px;background:var(--border);margin:10px 0"></div>
  <a href="#" onclick="doLogout();return false;"><i class="ri-logout-box-line" style="color:var(--danger)"></i>تسجيل الخروج</a>
  <a href="index.html" target="_blank"><i class="ri-external-link-line"></i>فتح التطبيق</a>`;
}

async function refreshSession(){
  const {data:{session}}=await sb.auth.getSession();
  state.user=session?.user||null;
  if(state.user){ const {data}=await sb.from('profiles').select('*, subscription_plans(*)').eq('id',state.user.id).single(); state.profile=data; }
  else state.profile=null;
  const pts=document.getElementById('admin-pts');
  if(state.user){ pts.style.display='flex'; pts.textContent='⭐ '+( state.profile?.points||0)+' نقطة'; }
  else pts.style.display='none';
}
function isAdmin(){ return state.profile && state.profile.role==='admin'; }

/* ============ ROUTER ============ */
const routes={};
function route(p,fn){ routes[p]=fn; }
async function renderRoute(){
  await refreshSession();
  const hash=location.hash||'#/login';
  const segs=hash.split('/').filter(Boolean);
  let matched=routes[hash]; let params={};
  if(!matched){ for(const key in routes){ const ks=key.split('/').filter(Boolean); if(ks.length!==segs.length) continue; let ok=true; const p={}; for(let i=0;i<ks.length;i++){ if(ks[i].startsWith(':')) p[ks[i].slice(1)]=segs[i]; else if(ks[i]!==segs[i]){ok=false;break;} } if(ok){ matched=routes[key]; params=p; break; } } }
  if(hash!=='#/login'&&!isAdmin()){ document.getElementById('app').innerHTML=`<div class="empty-state"><i class="ri-lock-2-line"></i><h3>غير مصرح</h3><a class="btn" href="#/login" style="margin-top:14px">تسجيل الدخول</a></div>`; return; }
  if(!matched){ document.getElementById('app').innerHTML=`<div class="empty-state"><i class="ri-error-warning-line"></i><h3>404</h3></div>`; return; }
  try{ await matched(params); }catch(e){ console.error(e); toast('حدث خطأ'); }
}
window.addEventListener('hashchange',renderRoute);

/* ============ LOGIN ============ */
route('#/login',async()=>{
  if(isAdmin()){ go('#/dashboard'); return; }
  document.getElementById('app').innerHTML=`<div style="max-width:380px;margin:60px auto 0">
  <div style="text-align:center;margin-bottom:24px"><i class="ri-shield-star-fill" style="font-size:50px;color:var(--accent)"></i><h2 style="margin:8px 0 0">Mangax Admin</h2></div>
  <div class="field"><label>البريد الإلكتروني</label><div class="input-wrap"><input id="ad-email" type="email"></div></div>
  <div class="field"><label>كلمة المرور</label><div class="input-wrap"><input id="ad-pass" type="password"></div></div>
  <button class="btn" style="width:100%" onclick="adminLogin()">دخول</button>
  <p class="muted" style="font-size:12px;margin-top:14px;text-align:center">نفّذ schema.sql أولاً ثم رقّ حسابك في SQL: update public.profiles set role='admin' where email='...'</p></div>`;
});
async function adminLogin(){
  const email=document.getElementById('ad-email').value.trim();
  const password=document.getElementById('ad-pass').value;
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error) return toast('بيانات الدخول غير صحيحة');
  await refreshSession();
  if(!isAdmin()){ toast('هذا الحساب ليس أدمن'); await sb.auth.signOut(); return; }
  toast('مرحباً بك'); go('#/dashboard');
}
async function doLogout(){ await sb.auth.signOut(); state.user=null; state.profile=null; go('#/login'); }

/* ============ DASHBOARD ============ */
route('#/dashboard',async()=>{
  document.getElementById('app').innerHTML=`<div class="spinner"></div>`;
  const [seriesC,chapC,usersC,activeSubC,pendingSubC,ptxC,pendingPtsC]=await Promise.all([
    sb.from('series').select('*',{count:'exact',head:true}),
    sb.from('chapters').select('*',{count:'exact',head:true}),
    sb.from('profiles').select('*',{count:'exact',head:true}),
    sb.from('profiles').select('*',{count:'exact',head:true}).eq('subscription_status','active'),
    sb.from('subscription_requests').select('*',{count:'exact',head:true}).eq('status','pending'),
    sb.from('points_transactions').select('*',{count:'exact',head:true}),
    sb.from('points_requests').select('*',{count:'exact',head:true}).eq('status','pending'),
  ]);
  const {data:topSeries}=await sb.from('series').select('title,views').order('views',{ascending:false}).limit(6);
  const {data:allProfiles}=await sb.from('profiles').select('subscription_status,created_at,points');
  const totalPoints=(allProfiles||[]).reduce((s,p)=>s+(p.points||0),0);

  document.getElementById('app').innerHTML=`
  <div class="section-title"><h2>لوحة التحكم</h2><button class="btn sm outline" onclick="renderRoute()"><i class="ri-refresh-line"></i>تحديث</button></div>
  <div class="grid grid-stats" style="margin-bottom:20px">
    ${statCard('ri-team-fill',usersC.count||0,'إجمالي المستخدمين')}
    ${statCard('ri-book-2-fill',seriesC.count||0,'إجمالي الأعمال')}
    ${statCard('ri-file-text-fill',chapC.count||0,'إجمالي الفصول')}
    ${statCard('ri-vip-crown-fill',activeSubC.count||0,'مشتركون نشطون')}
    ${statCard('ri-time-fill',pendingSubC.count||0,'طلبات اشتراك معلّقة')}
    ${statCard('ri-coin-fill',totalPoints,'إجمالي النقاط المتداولة')}
    ${statCard('ri-shopping-cart-2-fill',pendingPtsC.count||0,'طلبات نقاط معلّقة')}
  </div>
  <div class="grid grid-charts">
    <div class="card"><h3 style="margin:0 0 12px;font-size:14px">الأعمال الأكثر مشاهدة</h3><canvas id="chartTop"></canvas></div>
    <div class="card"><h3 style="margin:0 0 12px;font-size:14px">حالة الاشتراكات</h3><canvas id="chartSubs"></canvas></div>
    <div class="card"><h3 style="margin:0 0 12px;font-size:14px">تسجيلات آخر 7 أيام</h3><canvas id="chartUsers"></canvas></div>
  </div>
  <div class="menu-grid" style="margin-top:20px">
    ${menuTile('#/series','ri-book-2-line','إدارة الأعمال')}
    ${menuTile('#/users','ri-team-line','المستخدمون')}
    ${menuTile('#/subscription-requests','ri-vip-crown-2-line','طلبات الاشتراك')}
    ${menuTile('#/points-requests','ri-coin-line','طلبات النقاط')}
    ${menuTile('#/points-manager','ri-exchange-funds-line','إدارة النقاط')}
    ${menuTile('#/avatar-store','ri-user-star-line','متجر البروفيلات')}
    ${menuTile('#/chapters-lock','ri-lock-2-line','قفل الفصول')}
    ${menuTile('#/ads','ri-advertisement-line','الإعلانات')}
    ${menuTile('#/direct-links','ri-link','الروابط المباشرة')}
    ${menuTile('#/settings','ri-settings-3-line','الإعدادات')}
  </div>`;

  new Chart(document.getElementById('chartTop'),{type:'bar',data:{labels:(topSeries||[]).map(s=>s.title),datasets:[{data:(topSeries||[]).map(s=>s.views||0),backgroundColor:'#22c55e',borderRadius:6}]},options:chartOpts(false)});
  const sts=['free','pending','active','expired']; const scts=sts.map(s=>(allProfiles||[]).filter(p=>p.subscription_status===s).length);
  new Chart(document.getElementById('chartSubs'),{type:'doughnut',data:{labels:['مجاني','معلق','نشط','منتهي'],datasets:[{data:scts,backgroundColor:['#6b7280','#f59e0b','#22c55e','#ef4444']}]},options:{plugins:{legend:{labels:{color:'#9aa0a6'}}}}});
  const days=[]; const dcounts=[];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const key=d.toISOString().slice(0,10); days.push(key.slice(5)); dcounts.push((allProfiles||[]).filter(p=>p.created_at&&p.created_at.slice(0,10)===key).length); }
  new Chart(document.getElementById('chartUsers'),{type:'line',data:{labels:days,datasets:[{data:dcounts,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.2)',fill:true,tension:.3}]},options:chartOpts(false)});
});
function statCard(icon,num,lbl){ return `<div class="stat-card"><i class="${icon}"></i><div class="num">${num}</div><div class="lbl">${lbl}</div></div>`; }
function menuTile(route,icon,label){ return `<a class="menu-tile" href="${route}"><i class="${icon}"></i><span>${label}</span></a>`; }
function chartOpts(legend){ return {plugins:{legend:{display:legend}},scales:{x:{ticks:{color:'#9aa0a6'},grid:{color:'#2a2c30'}},y:{ticks:{color:'#9aa0a6'},grid:{color:'#2a2c30'}}}}; }

/* ============ SERIES MANAGEMENT ============ */
route('#/series',async()=>{
  document.getElementById('app').innerHTML=`<div class="section-title"><h2>إدارة الأعمال</h2><button class="btn" onclick="openSeriesForm()"><i class="ri-add-line"></i>إضافة عمل</button></div>
  <div class="field"><div class="input-wrap"><i class="ri-search-line"></i><input placeholder="بحث..." oninput="loadSeriesTable(this.value)"></div></div>
  <div id="series-table"><div class="spinner"></div></div>`;
  loadSeriesTable('');
});
async function loadSeriesTable(q){
  let query=sb.from('series').select('*').order('created_at',{ascending:false});
  if(q) query=query.ilike('title','%'+q+'%');
  const {data}=await query.limit(80);
  document.getElementById('series-table').innerHTML=(data&&data.length)?`<div class="card" style="overflow-x:auto"><table>
  <tr><th>الغلاف</th><th>العنوان</th><th>النوع</th><th>الحالة</th><th>المشاهدات</th><th>التقييم</th><th>إجراءات</th></tr>
  ${data.map(s=>`<tr>
    <td><img src="${s.cover_image||''}" style="width:38px;height:52px;object-fit:cover;border-radius:6px"></td>
    <td>${escapeHtml(s.title)}</td><td>${TYPE_LABEL[s.series_type]||''}</td>
    <td>${s.status==='ongoing'?'<span class="chip">مستمر</span>':s.status==='completed'?'<span class="chip gold">مكتمل</span>':'<span class="chip warn">قريباً</span>'}</td>
    <td>${s.views||0}</td><td>${(s.rating_avg||0).toFixed(1)}</td>
    <td><div class="row">
      <button class="btn sm ghost" onclick='openSeriesForm(${JSON.stringify(s).replace(/'/g,"'")})'><i class="ri-edit-line"></i></button>

async function managePages(chapterId, seriesId){

  </div>

    <p class="muted" style="font-size:12.5px;margin-bottom:8px">أضف رابطاً مباشراً لكل صورة (سطر لكل رابط)</p>
    <textarea class="ta" id="links-input" style="min-height:120px" placeholder="https://example.com/page1.jpg
https://example.com/page2.jpg"></textarea>
    <button class="btn" style="margin-top:8px" onclick="savePageLinks('${chapterId}')">حفظ الروابط</button>
  </div>
  <div style="margin-top:16px"><b style="font-size:13px">الصفحات الحالية (${pages?.length||0}) — اسحب لإعادة الترتيب</b>
  <div class="sortable-pages" id="pages-grid">
    ${(pages||[]).map(pg=>`<div class="page-thumb" data-id="${pg.id}" draggable="true" ondragstart="dragStart(event)" ondragover="event.preventDefault()" ondrop="dropPage(event,'${chapterId}')">
      <img src="${pg.image_url}"><div class="rm" onclick="deletePage('${pg.id}','${chapterId}','${seriesId}')">✕</div>
    </div>`).join('')}
  </div></div>
  <div class="row" style="gap:10px;margin-top:14px"><button class="btn outline" onclick="closeModal()">إغلاق</button></div>`);

function switchPagesTab(tab){
  document.getElementById('tab-upload').classList.toggle('active',tab==='upload');
  document.getElementById('tab-links').classList.toggle('active',tab==='links');
  document.getElementById('pages-upload-panel').style.display=tab==='upload'?'':'none';
  document.getElementById('pages-links-panel').style.display=tab==='links'?'':'none';
}
async function handleFileSelect(files,chapterId){
  const prog=document.getElementById('upload-progress');
  prog.innerHTML=`<div style="font-size:12.5px;color:var(--muted)">جاري رفع ${files.length} صورة...</div>`;
  const existing=await sb.from('chapter_pages').select('page_number').eq('chapter_id',chapterId).order('page_number',{ascending:false}).limit(1);
  let nextNum=(existing.data?.[0]?.page_number||0)+1;
  let done=0;
  for(const file of Array.from(files).sort((a,b)=>a.name.localeCompare(b.name))){
    const ext=file.name.split('.').pop();
    const path=`chapters/${chapterId}/${nextNum}_${Date.now()}.${ext}`;
    const {error:upErr}=await sb.storage.from('manga-pages').upload(path,file,{cacheControl:'3600',upsert:false});
    if(upErr){ prog.innerHTML+=`<div style="color:var(--danger);font-size:12px">فشل رفع ${file.name}</div>`; nextNum++; continue; }
    const {data:{publicUrl}}=sb.storage.from('manga-pages').getPublicUrl(path);
    await sb.from('chapter_pages').insert({chapter_id:chapterId,page_number:nextNum,image_url:publicUrl});
    done++; nextNum++;
    prog.innerHTML=`<div style="font-size:12.5px;color:var(--accent)">تم رفع ${done} من ${files.length}</div>`;
  }
  prog.innerHTML=`<div style="font-size:12.5px;color:var(--accent)">✓ اكتمل رفع ${done} صورة</div>`;
  const {data:serData}=await sb.from('chapters').select('series_id').eq('id',chapterId).single();
  managePages(chapterId, serData?.series_id||'');
}
function handleDrop(event,chapterId){ event.preventDefault(); document.getElementById('drop-zone').classList.remove('dragover'); handleFileSelect(event.dataTransfer.files,chapterId); }
async function savePageLinks(chapterId){
  const raw=document.getElementById('links-input').value.trim();
  const urls=raw.split(/\r?\n/).map(s=>s.trim()).filter(s=>s.startsWith('http'));
  if(!urls.length) return toast('لم يتم العثور على روابط صحيحة');
  const existing=await sb.from('chapter_pages').select('page_number').eq('chapter_id',chapterId).order('page_number',{ascending:false}).limit(1);
  let nextNum=(existing.data?.[0]?.page_number||0)+1;
  const rows=urls.map(url=>({chapter_id:chapterId,page_number:nextNum++,image_url:url}));
  const {error}=await sb.from('chapter_pages').insert(rows);
  if(error) return toast('تعذر الحفظ');
  toast('تم حفظ '+urls.length+' رابط'); document.getElementById('links-input').value='';
  const {data:serData}=await sb.from('chapters').select('series_id').eq('id',chapterId).single();
  managePages(chapterId, serData?.series_id||'');
}
async function deletePage(pageId,chapterId,seriesId){ await sb.from('chapter_pages').delete().eq('id',pageId); toast('تم حذف الصفحة'); managePages(chapterId,seriesId); }
let dragSrc=null;
function dragStart(e){ dragSrc=e.target.closest('.page-thumb'); }
async function dropPage(e,chapterId){
  e.preventDefault();
  const target=e.target.closest('.page-thumb');
  if(!target||!dragSrc||target===dragSrc) return;
  const grid=document.getElementById('pages-grid');
  const thumbs=[...grid.querySelectorAll('.page-thumb')];
  const srcIdx=thumbs.indexOf(dragSrc); const tgtIdx=thumbs.indexOf(target);
  if(srcIdx<tgtIdx) target.after(dragSrc); else target.before(dragSrc);
  const newOrder=[...grid.querySelectorAll('.page-thumb')].map(el=>el.dataset.id);
  for(let i=0;i<newOrder.length;i++) await sb.from('chapter_pages').update({page_number:i+1}).eq('id',newOrder[i]);
  toast('تم حفظ الترتيب');
}

/* ============ ADS CODES ============ */
route('#/ads',async()=>{
  document.getElementById('app').innerHTML=`<div class="section-title"><h2>أكواد الإعلانات</h2><button class="btn" onclick="openAdForm()"><i class="ri-add-line"></i>إضافة كود</button></div>
  <p class="muted" style="font-size:12.5px;margin-bottom:14px">أضف أكواد Adsterra أو أي شبكة إعلانات. ستُعرض تلقائياً في المواقع المحددة.</p>
  <div id="ads-table"><div class="spinner"></div></div>`;
  const {data}=await sb.from('ads_codes').select('*').order('created_at',{ascending:false});
  document.getElementById('ads-table').innerHTML=(data&&data.length)?data.map(ad=>`
  <div class="card" style="margin-bottom:12px"><div class="row between">
    <div><b>${ad.placement}</b> <span class="chip gray">${escapeHtml(ad.network)}</span> <span class="${ad.is_active?'chip':'chip gray'}">${ad.is_active?'مفعّل':'متوقف'}</span>
    <p class="muted" style="font-size:11.5px;margin:6px 0;max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(ad.code)}</p></div>
    <div class="row"><button class="btn sm ghost" onclick='openAdForm(${JSON.stringify(ad).replace(/'/g,"'")})'><i class="ri-edit-line"></i></button>
    <button class="btn sm danger" onclick="deleteAd('${ad.id}')"><i class="ri-delete-bin-line"></i></button></div>
  </div></div>`).join('') : `<div class="empty-state"><i class="ri-advertisement-line"></i><h3>لا توجد أكواد</h3></div>`;
});
function openAdForm(ad){ ad=ad||{}; openModal(`<h3>${ad.id?'تعديل':'إضافة'} كود إعلان</h3>
  <div class="field"><label>الموضع</label><div class="input-wrap"><select id="ad-placement">
    <option value="home_top" ${ad.placement==='home_top'?'selected':''}>أعلى الرئيسية</option>
    <option value="series_detail" ${ad.placement==='series_detail'?'selected':''}>صفحة تفاصيل العمل</option>
    <option value="before_reader" ${ad.placement==='before_reader'?'selected':''}>قبل القارئ</option>
  </select></div></div>
  <div class="field"><label>الشبكة</label><div class="input-wrap"><select id="ad-network">
    <option value="adsterra" ${ad.network==='adsterra'?'selected':''}>Adsterra</option>
    <option value="google_ads" ${ad.network==='google_ads'?'selected':''}>Google Ads</option>
    <option value="custom" ${ad.network==='custom'?'selected':''}>مخصص</option>
  </select></div></div>
  <div class="field"><label>كود الإعلان (HTML/JS)</label><textarea class="ta" id="ad-code" style="min-height:120px">${escapeHtml(ad.code||'')}</textarea></div>
  <div class="field row"><input type="checkbox" id="ad-active" ${ad.is_active!==false?'checked':''}>  <label style="margin:0">مفعّل</label></div>
  <div class="row" style="gap:10px"><button class="btn outline" style="flex:1" onclick="closeModal()">إلغاء</button><button class="btn" style="flex:1" onclick="saveAd('${ad.id||''}')">حفظ</button></div>`); }
async function saveAd(id){ const payload={placement:document.getElementById('ad-placement').value,network:document.getElementById('ad-network').value,code:document.getElementById('ad-code').value,is_active:document.getElementById('ad-active').checked}; if(!payload.code.trim()) return toast('كود الإعلان مطلوب'); const {error}=id?await sb.from('ads_codes').update(payload).eq('id',id):await sb.from('ads_codes').insert(payload); if(error) return toast('تعذر الحفظ'); closeModal(); toast('تم الحفظ'); renderRoute(); }
async function deleteAd(id){ if(!confirm('حذف؟'))return; await sb.from('ads_codes').delete().eq('id',id); toast('تم الحذف'); renderRoute(); }

/* ============ DIRECT LINKS ============ */
route('#/direct-links',async()=>{
  document.getElementById('app').innerHTML=`<div class="section-title"><h2>الروابط المباشرة (للربح)</h2><button class="btn" onclick="openLinkForm()"><i class="ri-add-line"></i>إضافة رابط</button></div>
  <p class="muted" style="font-size:12.5px;margin-bottom:14px">يظهر الرابط قبل فتح الفصل. النقرات تُحسب تلقائياً.</p>
  <div id="links-table"><div class="spinner"></div></div>`;
  const {data}=await sb.from('direct_links').select('*').order('created_at',{ascending:false});
  document.getElementById('links-table').innerHTML=(data&&data.length)?`<div class="card" style="overflow-x:auto"><table>
  <tr><th>العنوان</th><th>الرابط</th><th>النقرات</th><th>الحالة</th><th>إجراءات</th></tr>
  ${data.map(l=>`<tr><td>${escapeHtml(l.title)}</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(l.url)}</td>
  <td><b style="color:var(--accent)">${l.clicks||0}</b></td><td>${l.is_active?'<span class="chip">مفعّل</span>':'<span class="chip gray">متوقف</span>'}</td>
  <td><div class="row"><button class="btn sm ghost" onclick='openLinkForm(${JSON.stringify(l).replace(/'/g,"'")})'><i class="ri-edit-line"></i></button>
  <button class="btn sm danger" onclick="deleteLink('${l.id}')"><i class="ri-delete-bin-line"></i></button></div></td></tr>`).join('')}</table></div>` : `<div class="empty-state"><i class="ri-link"></i><h3>لا توجد روابط</h3></div>`;
});
function openLinkForm(l){ l=l||{}; openModal(`<h3>${l.id?'تعديل':'إضافة'} رابط مباشر</h3>
  <div class="field"><label>العنوان</label><div class="input-wrap"><input id="dl-title" value="${escapeHtml(l.title||'')}"></div></div>
  <div class="field"><label>الرابط</label><div class="input-wrap"><input id="dl-url" value="${escapeHtml(l.url||'')}"></div></div>
  <div class="field row"><input type="checkbox" id="dl-active" ${l.is_active!==false?'checked':''}>  <label style="margin:0">مفعّل</label></div>
  <div class="row" style="gap:10px"><button class="btn outline" style="flex:1" onclick="closeModal()">إلغاء</button><button class="btn" style="flex:1" onclick="saveLink('${l.id||''}')">حفظ</button></div>`); }
async function saveLink(id){ const payload={title:document.getElementById('dl-title').value.trim(),url:document.getElementById('dl-url').value.trim(),placement:'before_chapter',is_active:document.getElementById('dl-active').checked}; if(!payload.title||!payload.url) return toast('أكمل الحقول'); const {error}=id?await sb.from('direct_links').update(payload).eq('id',id):await sb.from('direct_links').insert(payload); if(error) return toast('تعذر الحفظ'); closeModal(); toast('تم الحفظ'); renderRoute(); }
async function deleteLink(id){ if(!confirm('حذف؟'))return; await sb.from('direct_links').delete().eq('id',id); toast('تم الحذف'); renderRoute(); }

/* ============ SETTINGS ============ */
route('#/settings',async()=>{
  const {data}=await sb.from('site_settings').select('*');
  const map={}; (data||[]).forEach(s=>map[s.key]=s.value);
  const price=JSON.parse(map.points_price||'{"currency":"SAR","price_per_point":1}');
  document.getElementById('app').innerHTML=`<div class="section-title"><h2>إعدادات الموقع</h2></div>
  <div class="card" style="margin-bottom:14px">
    <h3 style="margin:0 0 14px;font-size:14px">الإعدادات العامة</h3>
    <div class="field"><label>اسم التطبيق</label><div class="input-wrap"><input id="set-name" value="${escapeHtml(JSON.parse(map.app_name||'"Mangax"'))}"></div></div>
    <div class="field"><label>وضع الصيانة</label><div class="row"><input type="checkbox" id="set-maint" ${JSON.parse(map.maintenance_mode||'false')?'checked':''}><label style="margin:0;font-size:13px">تفعيل وضع الصيانة (يوقف الموقع مؤقتاً)</label></div></div>
    <button class="btn" onclick="saveGeneralSettings()">حفظ</button>
  </div>
  <div class="card">
    <h3 style="margin:0 0 14px;font-size:14px">إعدادات النقاط</h3>
    <div class="grid grid-2">
      <div class="field"><label>سعر النقطة الواحدة</label><div class="input-wrap"><input id="set-pts-price" type="number" value="${price.price_per_point||1}" min="0.1" step="0.1"></div></div>
      <div class="field"><label>العملة</label><div class="input-wrap"><select id="set-currency"><option value="SAR" ${price.currency==='SAR'?'selected':''}>ريال سعودي (SAR)</option><option value="USD" ${price.currency==='USD'?'selected':''}>دولار (USD)</option><option value="EGP" ${price.currency==='EGP'?'selected':''}>جنيه مصري (EGP)</option></select></div></div>
    </div>
    <button class="btn gold" onclick="savePointsSettings()">حفظ إعدادات النقاط</button>
  </div>`;
});
async function saveGeneralSettings(){
  await sb.from('site_settings').upsert([{key:'app_name',value:JSON.stringify(document.getElementById('set-name').value.trim())},{key:'maintenance_mode',value:JSON.stringify(document.getElementById('set-maint').checked)}]);
  toast('تم حفظ الإعدادات');
}
async function savePointsSettings(){
  const val={currency:document.getElementById('set-currency').value,price_per_point:parseFloat(document.getElementById('set-pts-price').value)||1};
  await sb.from('site_settings').upsert([{key:'points_price',value:JSON.stringify(val)}]);
  toast('تم حفظ إعدادات النقاط');
}

/* ============ INIT ============ */
renderRoute();
</script>
</body>
</html>
