<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mangax - تطبيق المانجا والمانهوا</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --accent:#22c55e; --accent-dark:#15803d; --accent-soft:rgba(34,197,94,.15);
  --bg:#0b0c0d; --bg2:#141517; --card:#1a1b1e; --card2:#202226;
  --text:#f3f4f6; --muted:#9aa0a6; --border:#2a2c30; --danger:#ef4444; --gold:#eab308;
  --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;border:none;}
input,select,textarea{font-family:inherit;} img{display:block;max-width:100%;}
::-webkit-scrollbar{width:0;height:0;}
#shell{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg);overflow-x:hidden;}
#app{padding-bottom:84px;min-height:100vh;}
.statusbar{height:env(safe-area-inset-top,12px);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.topbar h1{font-size:19px;font-weight:800;margin:0;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:18px;position:relative;}
.icon-btn .dot{position:absolute;top:6px;left:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);}
.row{display:flex;align-items:center;gap:10px;}
.between{justify-content:space-between;}
.back-row{display:flex;align-items:center;gap:12px;padding:14px 16px 6px;}
.back-row h2{font-size:17px;font-weight:800;margin:0;flex:1;text-align:center;margin-right:38px;}
.points-pill{display:flex;align-items:center;gap:5px;background:linear-gradient(90deg,var(--gold),#fbbf24);color:#3a2a00;font-weight:800;font-size:12.5px;padding:7px 12px;border-radius:20px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:var(--radius-sm);background:var(--accent);color:#06140a;font-weight:800;font-size:15px;transition:.15s;}
.btn:active{transform:scale(.97);}
.btn.outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn.ghost{background:var(--card);color:var(--text);}
.btn.danger{background:var(--danger);color:#fff;}
.btn.gold{background:linear-gradient(90deg,var(--gold),#fbbf24);color:#3a2a00;}
.btn.sm{padding:10px;font-size:13px;width:auto;}
.btn[disabled]{opacity:.5;}
.btn-icon-circle{width:42px;height:42px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;}
.input-wrap{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;}
.input-wrap i{color:var(--muted);font-size:17px;}
.input-wrap input,.input-wrap select{flex:1;background:transparent;border:none;color:var(--text);padding:13px 8px;font-size:14px;outline:none;}
textarea.ta{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px;font-size:14px;outline:none;resize:vertical;min-height:90px;}
.section{padding:6px 16px 4px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-head h3{font-size:15.5px;font-weight:800;margin:0;}
.section-head a{font-size:12px;color:var(--accent);font-weight:700;}
.hscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x proximity;}
.poster{flex:0 0 110px;scroll-snap-align:start;position:relative;}
.poster img{width:110px;height:150px;border-radius:12px;object-fit:cover;background:var(--card);}
.poster .rank{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#06140a;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
.poster .pname{font-size:12px;margin-top:6px;font-weight:600;line-height:1.3;}
.list-card{display:flex;gap:12px;background:var(--card);border-radius:var(--radius);padding:10px;margin-bottom:10px;}
.list-card img{width:64px;height:84px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.list-card .info{flex:1;min-width:0;}
.list-card .title{font-weight:800;font-size:14px;margin:0 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-card .meta{font-size:11.5px;color:var(--muted);margin-bottom:6px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-soft);color:var(--accent);font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:20px;}
.chip.gray{background:var(--card2);color:var(--muted);}
.chip.gold{background:rgba(234,179,8,.15);color:var(--gold);}
.chip.lock{background:rgba(239,68,68,.12);color:var(--danger);}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:8px;color:#06140a;vertical-align:middle;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.hero{position:relative;height:330px;border-radius:0 0 24px 24px;overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top, var(--bg) 2%, transparent 55%);}
.hero-content{position:absolute;bottom:16px;right:16px;left:16px;z-index:2;}
.hero-content h2{font-size:21px;font-weight:900;margin:0 0 4px;}
.hero-content p{font-size:12px;color:#d8d8d8;margin:0 0 12px;}
.hero-top{position:absolute;top:0;left:0;right:0;z-index:3;padding:14px 16px;display:flex;justify-content:space-between;}
.bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom,0));z-index:50;}
.bottomnav .nitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;padding:6px 0;font-weight:700;}
.bottomnav .nitem i{font-size:21px;}
.bottomnav .nitem.active{color:var(--accent);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{max-width:480px;width:100%;background:var(--bg2);border-radius:22px 22px 0 0;padding:20px;max-height:88vh;overflow-y:auto;animation:up .2s ease;}
@keyframes up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px;}
.sheet h3{font-size:17px;font-weight:800;margin:0 0 14px;text-align:center;}
.center-modal{display:flex;align-items:center;justify-content:center;}
.box-modal{width:88%;background:var(--bg2);border-radius:20px;padding:22px;text-align:center;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1f2023;color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:80%;text-align:center;}
.muted{color:var(--muted);}
.center{text-align:center;}
.empty-state{text-align:center;padding:60px 20px;}
.empty-state i{font-size:60px;color:var(--accent);margin-bottom:14px;}
.empty-state h3{font-size:17px;margin:0 0 6px;}
.empty-state p{color:var(--muted);font-size:13px;}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite;margin:40px auto;}
@keyframes sp{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:14px 0;}
.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:var(--card2);}
.stars{color:#fbbf24;font-size:13px;}
.tab-pills{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;}
.pill{padding:8px 16px;border-radius:20px;background:var(--card);color:var(--muted);font-size:12.5px;font-weight:700;white-space:nowrap;border:1px solid var(--border);}
.pill.active{background:var(--accent);color:#06140a;border-color:var(--accent);}
.fab{position:fixed;bottom:96px;left:24px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#06140a;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 6px 18px rgba(0,0,0,.4);z-index:40;}
.calendar-strip{display:flex;gap:8px;overflow-x:auto;padding:10px 0;}
.cal-day{flex:0 0 50px;background:var(--card);border-radius:14px;padding:10px 0;text-align:center;}
.cal-day.active{background:var(--accent);color:#06140a;}
.cal-day .d{font-size:11px;color:var(--muted);}
.cal-day.active .d{color:#06140a;}
.cal-day .n{font-size:16px;font-weight:800;}
.timeline-item{display:flex;gap:12px;margin-bottom:16px;}
.timeline-item .time{font-size:12px;color:var(--muted);width:46px;flex-shrink:0;padding-top:6px;}
.swatch{width:42px;height:42px;border-radius:50%;border:3px solid transparent;display:inline-flex;}
.swatch.active{border-color:var(--text);}
.progress-bar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;}
.progress-bar .fill{height:100%;background:var(--accent);}
.ad-slot{margin:10px 16px;min-height:0;}
.ad-slot:empty{display:none;}
.reply-box{display:flex;gap:8px;align-items:center;background:var(--bg2);padding:10px 12px;border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding-bottom:calc(10px + env(safe-area-inset-bottom,0));}
.reply-box input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:11px 16px;color:var(--text);outline:none;}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#06140a;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.locked-banner{background:var(--card);border:1px dashed var(--accent);border-radius:var(--radius);padding:20px;text-align:center;margin:16px;}
/* reader */
.reader-page{width:100%;display:block;background:#050505;}
.reader-toolbar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:rgba(20,21,23,.92);backdrop-filter:blur(6px);padding:10px 16px calc(10px + env(safe-area-inset-bottom,0));display:flex;justify-content:space-between;align-items:center;z-index:60;}
.reader-top{position:fixed;top:0;left:0;right:0;max-width:480px;margin:0 auto;background:rgba(20,21,23,.92);backdrop-filter:blur(6px);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:60;}
.page-nav-btn{width:46px;height:46px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px;}
.avatar-store-item{position:relative;text-align:center;}
.avatar-store-item img{width:100%;aspect-ratio:1;border-radius:14px;object-fit:cover;background:var(--card);}
.avatar-store-item .price{font-size:11px;margin-top:6px;color:var(--gold);font-weight:800;}
.tx-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
</style>
</head>
<body>
<div id="shell"><div id="app"></div><div id="modal-root"></div><div id="toast-root"></div></div>
<script>
/* =========================================================
   MANGAX - USER APP
   ========================================================= */
// ===== UPDATED SUPABASE CREDENTIALS =====
const SUPABASE_URL = 'https://vwyambddhlgrgtqmxwik.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8jM7dTNHTs80u34uzVc3Kg_LUDFDW_A';
// =========================================

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const THEMES = {green:{a:'#22c55e',d:'#15803d'},blue:{a:'#3b82f6',d:'#1d4ed8'},purple:{a:'#a855f7',d:'#7e22ce'},red:{a:'#ef4444',d:'#b91c1c'},orange:{a:'#f97316',d:'#c2410c'},pink:{a:'#ec4899',d:'#be185d'},teal:{a:'#14b8a6',d:'#0f766e'},gold:{a:'#eab308',d:'#a16207'}};
const GENRES = ['أكشن','دراما','كوميدي','مغامرة','رومانسي','خيال علمي','رعب','غموض','إيسيكاي','شريحة من الحياة','سحر','رياضة','بطل خارق'];
const TYPE_LABEL = {manga:'مانجا',manhwa:'مانهوا',manhua:'مانهوا صينية'};

const state = { session:null, user:null, profile:null, route:'#/splash', params:{}, listFilters:{sort:'popularity', type:'all', genre:'all'}, readerPages:[], readerIdx:0, readerMode:'scroll', readerDir:'rtl' };

function setTheme(name){
  const t = THEMES[name] || THEMES.green;
  document.documentElement.style.setProperty('--accent', t.a);
  document.documentElement.style.setProperty('--accent-dark', t.d);
  document.documentElement.style.setProperty('--accent-soft', t.a+'26');
  localStorage.setItem('mangax_theme', name);
}
setTheme(localStorage.getItem('mangax_theme') || 'green');

function toast(msg){ const root=document.getElementById('toast-root'); const el=document.createElement('div'); el.className='toast'; el.textContent=msg; root.appendChild(el); setTimeout(()=>el.remove(),2400); }
function go(route, params={}){ state.params = params; location.hash = route; }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&','<':'<','>':'>','"':'"',"'":'''}[c])); }
function timeAgo(dateStr){
  const d = new Date(dateStr); const diff = (Date.now()-d.getTime())/1000;
  if(diff<60) return 'الآن'; if(diff<3600) return Math.floor(diff/60)+' د'; if(diff<86400) return Math.floor(diff/3600)+' س';
  if(diff<2592000) return Math.floor(diff/86400)+' يوم'; return d.toLocaleDateString('ar');
}
function starsHtml(score){ score=score||0; const full=Math.round(score/2); let h=''; for(let i=0;i<5;i++) h+=`<i class="ri-star-${i<full?'fill':'line'}"></i>`; return `<span class="stars">${h}</span>`; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function openSheet(html){ document.getElementById('modal-root').innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">${html}</div></div>`; }
function openCenter(html){ document.getElementById('modal-root').innerHTML = `<div class="overlay center-modal" onclick="if(event.target===this)closeModal()"><div class="box-modal">${html}</div></div>`; }
async function renderAdSlot(elId, placement){
  const el = document.getElementById(elId); if(!el) return;
  const {data} = await sb.from('ads_codes').select('*').eq('placement',placement).eq('is_active',true).limit(1);
  if(data && data[0]){ el.innerHTML = data[0].code; el.querySelectorAll('script').forEach(old=>{ const s=document.createElement('script'); [...old.attributes].forEach(a=>s.setAttribute(a.name,a.value)); s.textContent=old.textContent; old.replaceWith(s); }); }
}
function badgeHtml(plan){
  if(!plan) return '';
  return `<span class="badge" style="background:${plan.badge_color||'#22c55e'}">${escapeHtml(plan.badge_text||'مميز')}</span>`;
}

/* ---------------- AUTH ---------------- */
async function refreshSession(){
  const {data:{session}} = await sb.auth.getSession();
  state.session = session; state.user = session?.user || null;
  if(state.user){
    const {data} = await sb.from('profiles').select('*, subscription_plans(*)').eq('id', state.user.id).single();
    state.profile = data;
  } else state.profile = null;
}
function isLoggedIn(){ return !!state.user; }
function isSubscriber(){ return state.profile && (state.profile.role==='admin' || (state.profile.subscription_status==='active' && state.profile.subscription_end && new Date(state.profile.subscription_end) > new Date())); }
function myPoints(){ return state.profile?.points || 0; }
function requireAuth(){ if(!isLoggedIn()){ toast('سجّل الدخول أولاً'); go('#/login'); return false;} return true; }

sb.auth.onAuthStateChange((event, session)=>{
  state.session = session; state.user = session?.user || null;
  if(event === 'PASSWORD_RECOVERY'){ go('#/reset-password'); }
});

/* ---------------- LAYOUT HELPERS ---------------- */
function bottomNav(active){
  const items = [
    {r:'#/home', i:'ri-home-5-fill', l:'الرئيسية'},
    {r:'#/release-calendar', i:'ri-calendar-2-fill', l:'الإصدارات'},
    {r:'#/my-list', i:'ri-bookmark-fill', l:'قائمتي'},
    {r:'#/points-store', i:'ri-coin-fill', l:'النقاط'},
    {r:'#/profile', i:'ri-user-3-fill', l:'حسابي'},
  ];
  return `<div class="bottomnav">${items.map(it=>`<a class="nitem ${active===it.r?'active':''}" href="${it.r}"><i class="${it.i}"></i><span>${it.l}</span></a>`).join('')}</div>`;
}
function topbarSimple(title, opts={}){
  return `<div class="statusbar"></div>
  <div class="topbar">
    <h1>${title}</h1>
    <div class="row" style="gap:8px">
      ${isLoggedIn()?`<a class="points-pill" href="#/points-store"><i class="ri-coin-fill"></i> ${myPoints()}</a>`:''}
      ${opts.search!==false?`<a class="icon-btn" href="#/search"><i class="ri-search-line"></i></a>`:''}
      <a class="icon-btn" href="#/notifications"><i class="ri-notification-3-line"></i></a>
    </div>
  </div>`;
}
function backHeader(title, right){
  return `<div class="statusbar"></div>
  <div class="back-row">
    <button class="icon-btn" onclick="history.back()"><i class="ri-arrow-right-line"></i></button>
    <h2>${title}</h2>
    ${right||''}
  </div>`;
}
function posterCard(s, idx){
  return `<a class="poster" href="#/series/${s.id}">
    ${idx!=null?`<span class="rank">${idx+1}</span>`:''}
    <img src="${s.cover_image||''}" loading="lazy" onerror="this.style.background='#222'">
    <div class="pname">${escapeHtml(s.title)}</div>
  </a>`;
}
function listCard(s){
  const genres = (s.genres||[]).slice(0,3).join('، ');
  return `<a class="list-card" href="#/series/${s.id}">
    <img src="${s.cover_image||''}" loading="lazy">
    <div class="info">
      <p class="title">${escapeHtml(s.title)}</p>
      <p class="meta">${s.year||''} | ${TYPE_LABEL[s.series_type]||''}</p>
      <p class="meta">${escapeHtml(genres)}</p>
      <button class="chip" style="margin-top:6px" onclick="event.preventDefault();event.stopPropagation();toggleMyList('${s.id}', this)"><i class="ri-bookmark-line"></i> قائمتي</button>
    </div>
  </a>`;
}
async function toggleMyList(seriesId, btn){
  if(!requireAuth()) return;
  const {data} = await sb.from('my_list').select('*').eq('user_id',state.user.id).eq('series_id',seriesId).maybeSingle();
  if(data){ await sb.from('my_list').delete().eq('user_id',state.user.id).eq('series_id',seriesId); toast('تمت الإزالة من قائمتي'); if(btn) btn.innerHTML='<i class="ri-bookmark-line"></i> قائمتي'; }
  else { await sb.from('my_list').insert({user_id:state.user.id, series_id:seriesId}); toast('أُضيف إلى قائمتي'); if(btn) btn.innerHTML='<i class="ri-bookmark-fill"></i> أُضيف ✓'; }
}

/* ================= ROUTER ================= */
const routes = {};
function route(path, fn){ routes[path]=fn; }
async function renderRoute(){
  const hash = location.hash || '#/splash';
  const [path] = hash.split('?');
  const segs = path.split('/').filter(Boolean);
  let matched = routes[path]; let params = Object.assign({}, state.params); let routeKey = path;
  if(!matched){
    for(const key in routes){
      const ks = key.split('/').filter(Boolean);
      if(ks.length!==segs.length) continue;
      let ok=true; const p={};
      for(let i=0;i<ks.length;i++){ if(ks[i].startsWith(':')) p[ks[i].slice(1)]=segs[i]; else if(ks[i]!==segs[i]){ok=false;break;} }
      if(ok){ matched=routes[key]; Object.assign(params,p); routeKey=key; break; }
    }
  }
  state.route = routeKey;
  window.scrollTo(0,0);
  if(!matched){ document.getElementById('app').innerHTML = `<div class="empty-state"><i class="ri-error-warning-line"></i><h3>404</h3></div>`; return; }
  try{ await matched(params); }catch(e){ console.error(e); toast('حدث خطأ، حاول مجدداً'); }
}
window.addEventListener('hashchange', renderRoute);

/* ================= SCREENS ================= */
route('#/splash', async ()=>{
  document.getElementById('app').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px">
    <div style="font-size:54px;color:var(--accent)"><i class="ri-book-read-fill"></i></div><div class="spinner"></div></div>`;
  await refreshSession();
  setTimeout(()=>{ go(isLoggedIn() ? '#/home' : '#/welcome'); }, 600);
});

route('#/welcome', async ()=>{

route('#/release-calendar', async ()=>{
  const today = new Date();
  document.getElementById('app').innerHTML = topbarSimple('تقويم الإصدارات') + `
  <div style="padding:0 16px"><div class="calendar-strip" id="cal-strip"></div></div>
  <div id="cal-content" style="padding:10px 16px"><div class="spinner"></div></div>${bottomNav('#/release-calendar')}`;
  const strip = document.getElementById('cal-strip');
  const days = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  let html='';
  for(let i=-3;i<=10;i++){ const d=new Date(today); d.setDate(d.getDate()+i); html += `<div class="cal-day ${i===0?'active':''}" data-i="${i}" onclick="selectCalDay(${i})"><div class="d">${days[d.getDay()]}</div><div class="n">${d.getDate()}</div></div>`; }
  strip.innerHTML = html;
  await selectCalDay(0);
});
async function selectCalDay(offset){
  document.querySelectorAll('.cal-day').forEach(d=>d.classList.toggle('active', d.dataset.i==offset));
  const d = new Date(); d.setDate(d.getDate()+offset);
  const start = new Date(d.getFullYear(),d.getMonth(),d.getDate()).toISOString();
  const end = new Date(d.getFullYear(),d.getMonth(),d.getDate()+1).toISOString();
  const {data} = await sb.from('chapters').select('*, series(*)').gte('release_date',start).lt('release_date',end).order('release_date');
  const box = document.getElementById('cal-content');
  box.innerHTML = (data&&data.length) ? data.map(c=>`
    <div class="timeline-item">
      <div class="time">${new Date(c.release_date).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'})}</div>
      <div class="list-card" style="flex:1;margin-bottom:0" onclick="go('#/series/${c.series?.id}')">
        <img src="${c.series?.cover_image||''}">
        <div class="info"><p class="title">${escapeHtml(c.series?.title||'')}</p><p class="meta">الفصل ${c.chapter_number}</p>
        <button class="chip" onclick="event.stopPropagation();toggleMyList('${c.series?.id}')"><i class="ri-bookmark-line"></i> قائمتي</button></div>
      </div></div>`).join('') : `<div class="empty-state"><i class="ri-emotion-sad-line"></i><h3>لا يوجد جدول إصدار</h3><p>عذراً، لا توجد فصول صادرة في هذا التاريخ</p></div>`;
}

async function openChapter(chapterId){
  if(!chapterId) return toast('لا توجد فصول متاحة');
  const {data:chapter} = await sb.from('chapters').select('*, series(*)').eq('id',chapterId).single();
  if(!chapter) return toast('الفصل غير متاح');
  let unlocked = chapter.access_type==='free';
  if(!unlocked && state.profile?.role==='admin') unlocked = true;
  if(!unlocked && chapter.access_type==='subscribers' && isSubscriber()) unlocked = true;
  if(!unlocked && chapter.access_type==='points'){
    const {data} = state.user ? await sb.from('chapter_purchases').select('*').eq('user_id',state.user.id).eq('chapter_id',chapterId).maybeSingle() : {data:null};

/* offline save via IndexedDB */
function idbOpen(){ return new Promise((res,rej)=>{ const req = indexedDB.open('mangax_offline',1); req.onupgradeneeded = ()=>{ req.result.createObjectStore('chapters',{keyPath:'id'}); }; req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
async function saveChapterOffline(chapterId){
  openCenter(`<i class="ri-download-2-line" style="font-size:40px;color:var(--accent);margin-bottom:10px"></i><h3 style="margin:0 0 14px">جاري حفظ الفصل...</h3>
  <div class="progress-bar"><div class="fill" id="dl-fill" style="width:0%"></div></div><p class="muted" id="dl-pct" style="font-size:12px;margin-top:10px">0%</p>`);
  try{
    const {data:chapter} = await sb.from('chapters').select('*, series(*)').eq('id',chapterId).single();
    const pages = state.readerPages;
    const blobs = [];
    for(let i=0;i<pages.length;i++){
      const res = await fetch(pages[i].image_url); const blob = await res.blob();
      blobs.push(await new Promise(r=>{ const fr = new FileReader(); fr.onload=()=>r(fr.result); fr.readAsDataURL(blob); }));
      const pct = Math.round((i+1)/pages.length*100);
      document.getElementById('dl-fill').style.width = pct+'%'; document.getElementById('dl-pct').textContent = pct+'%';
    }
    const db = await idbOpen();
    await new Promise((res,rej)=>{ const tx = db.transaction('chapters','readwrite');
      tx.objectStore('chapters').put({id:chapterId, seriesTitle:chapter.series?.title, seriesCover:chapter.series?.cover_image, chapterNumber:chapter.chapter_number, pages:blobs, savedAt:Date.now()});
      tx.oncomplete=res; tx.onerror=rej; });
    closeModal(); toast('تم حفظ الفصل للقراءة بدون نت ✓');
  }catch(e){ console.error(e); closeModal(); toast('تعذر حفظ الفصل'); }
}

  if(!username || !amount || amount<=0) return toast('أكمل البيانات');

  toast(data.msg); await refreshSession(); go('#/points-store');
}

route('#/avatar-store', async ()=>{

async function setActiveAvatar(url){

async function doLogout(){ await sb.auth.signOut(); state.user=null; state.profile=null; toast('تم تسجيل الخروج'); go('#/welcome'); }

route('#/theme-settings', async ()=>{
  document.getElementById('app').innerHTML = `${backHeader('تبديل الألوان')}
  <p class="muted" style="padding:0 20px">اختر لون الواجهة المفضّل لديك</p>
  <div style="padding:18px 20px;display:flex;flex-wrap:wrap;gap:18px">

  setTheme(name); document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active')); document.getElementById('swatch-'+name).classList.add('active');

route('#/subscriptions', async ()=>{
  if(!requireAuth()) return;
  document.getElementById('app').innerHTML = `${backHeader('الاشتراكات والباقات')}<div id="plans-wrap" style="padding:10px 16px"><div class="spinner"></div></div>`;
  const {data:plans} = await sb.from('subscription_plans').select('*').eq('is_active',true).order('sort_order');
  const {data:myReq} = await sb.from('subscription_requests').select('*').eq('user_id',state.user.id).order('created_at',{ascending:false}).limit(1);

  ${pending?`<div class="locked-banner"><i class="ri-time-line" style="font-size:30px;color:var(--accent)"></i><h3>طلبك قيد المراجعة</h3></div>`:''}
  ${(plans||[]).map(pl=>`
  <div style="background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--border)">
    <div class="row between"><h3 style="margin:0">${escapeHtml(pl.name)} ${badgeHtml(pl)}</h3><span style="color:var(--accent);font-weight:900;font-size:18px">${pl.price} ${pl.currency}</span></div>
    <p class="muted" style="font-size:12px;margin:4px 0 10px">${pl.duration_days} يوم</p>
    ${(pl.features||[]).map(f=>`<div class="row" style="gap:8px;margin-bottom:6px"><i class="ri-checkbox-circle-fill" style="color:var(--accent)"></i><span style="font-size:13px">${escapeHtml(f)}</span></div>`).join('')}
    <button class="btn" style="margin-top:10px" ${pending||isSubscriber()?'disabled':''} onclick="requestSubscription('${pl.id}')">${isSubscriber()?'مفعّل':pending?'قيد المراجعة':'اشترك الآن'}</button>
  </div>`).join('') || '<p class="muted center">لا توجد باقات متاحة حالياً</p>'}`;

async function requestSubscription(planId){
  await sb.from('subscription_requests').insert({user_id:state.user.id, plan_id:planId, status:'pending'});
  await sb.from('profiles').update({subscription_status:'pending'}).eq('id',state.user.id);
  toast('تم إرسال طلب الاشتراك، سيتم مراجعته من قبل الإدارة'); renderRoute();
}

      <p style="font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6">${escapeHtml(n.content||'')}</p></div></div>`).join('') : `<div class="empty-state"><i class="ri-newspaper-line"></i><h3>لا أخبار حالياً</h3></div>`;

/* ---------------- POLLS ---------------- */
route('#/polls', async ()=>{
  document.getElementById('app').innerHTML = `${backHeader('التصويتات')}<div id="polls-wrap" style="padding:10px 16px"><div class="spinner"></div></div>`;
  const {data:polls} = await sb.from('polls').select('*').eq('is_active',true).order('created_at',{ascending:false});
  let myVotes = {};
  if(state.user && polls?.length){
    const {data:votes} = await sb.from('poll_votes').select('*').eq('user_id',state.user.id).in('poll_id',polls.map(p=>p.id));
    votes?.forEach(v=>myVotes[v.poll_id]=v.option_index);
  }
  document.getElementById('polls-wrap').innerHTML = (polls&&polls.length) ? await Promise.all(polls.map(async pl=>{
    const {data:allVotes} = await sb.from('poll_votes').select('option_index').eq('poll_id',pl.id);
    const total = allVotes?.length||0;
    const counts = (pl.options||[]).map((_,i)=>allVotes?.filter(v=>v.option_index===i).length||0);
    const voted = myVotes[pl.id]!==undefined;
    return `<div style="background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px">
      <h3 style="font-size:14.5px;margin:0 0 12px">${escapeHtml(pl.question)}</h3>
      ${(pl.options||[]).map((opt,i)=>{
        const pct = total ? Math.round(counts[i]*100/total) : 0;
        return voted ? `<div style="margin-bottom:10px"><div class="row between" style="font-size:12.5px;margin-bottom:4px"><span>${escapeHtml(opt)} ${myVotes[pl.id]===i?'<i class="ri-checkbox-circle-fill" style="color:var(--accent)"></i>':''}</span><span class="muted">${pct}%</span></div><div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div></div>`
        : `<button class="btn outline" style="margin-bottom:8px;justify-content:flex-start;padding:11px 16px" onclick="vote('${pl.id}',${i})">${escapeHtml(opt)}</button>`;
      }).join('')}
      <p class="muted" style="font-size:11px;margin-top:6px">${total} صوت</p>
    </div>`;
  })).then(arr=>arr.join('')) : `<div class="empty-state"><i class="ri-bar-chart-box-line"></i><h3>لا تصويتات حالياً</h3></div>`;
});
async function vote(pollId, idx){
  if(!requireAuth()) return;
  const {error} = await sb.from('poll_votes').insert({poll_id:pollId, user_id:state.user.id, option_index:idx});
  if(error) return toast('لقد صوّت بالفعل');
  toast('تم تسجيل صوتك'); renderRoute();
}

      <h3 style="font-size:14.5px;margin:0 0 4px">${p.is_pinned?'<i class="ri-pushpin-fill" style="color:var(--accent)"></i> ':''}${escapeHtml(p.title)}</h3>

route('#/forum-new', async ()=>{
  if(!requireAuth()) return;
  if(!isSubscriber()){ toast('النشر للمشتركين فقط'); go('#/subscriptions'); return; }
  document.getElementById('app').innerHTML = `${backHeader('موضوع جديد')}

    <div class="field"><label>العنوان</label><div class="input-wrap"><i class="ri-text"></i><input id="fp-title"></div></div>
    <div class="field"><label>المحتوى</label><textarea class="ta" id="fp-content"></textarea></div>
    <button class="btn" onclick="submitForumPost()">نشر</button>

async function submitForumPost(){
  const title = document.getElementById('fp-title').value.trim();
  const content = document.getElementById('fp-content').value.trim();
  if(!title||!content) return toast('أكمل الحقول');
  const {error} = await sb.from('forum_posts').insert({user_id:state.user.id,title,content});
  if(error) return toast('تعذر النشر (تحتاج اشتراكاً فعالاً)');
  toast('تم نشر الموضوع'); go('#/forum');
}
route('#/forum-post/:id', async (p)=>{
  if(!requireAuth()) return;
  const {data:post} = await sb.from('forum_posts').select('*, profiles(username,avatar_url,subscription_plans(badge_text,badge_color))').eq('id',p.id).single();
  const {data:replies} = await sb.from('forum_replies').select('*, profiles(username,avatar_url,subscription_plans(badge_text,badge_color))').eq('post_id',p.id).order('created_at');
  document.getElementById('app').innerHTML = `${backHeader('الموضوع')}
  <div style="padding:10px 16px 90px">
    <div style="background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px">
      <div class="row" style="gap:8px;margin-bottom:8px"><img class="avatar" style="width:30px;height:30px" src="${post?.profiles?.avatar_url||''}"><span style="font-size:13px;font-weight:700">${escapeHtml(post?.profiles?.username||'')} ${badgeHtml(post?.profiles?.subscription_plans)}</span></div>
      <h3 style="margin:0 0 6px">${escapeHtml(post?.title||'')}</h3>
      <p style="font-size:13.5px;line-height:1.7">${escapeHtml(post?.content||'')}</p>
    </div>
    <p class="muted" style="font-size:12px;margin-bottom:8px">${replies?.length||0} ردّ</p>
    ${(replies||[]).map(r=>`<div class="row" style="align-items:flex-start;gap:10px;margin-bottom:14px">
      <img class="avatar" style="width:32px;height:32px" src="${r.profiles?.avatar_url||''}">
      <div><span style="font-size:12.5px;font-weight:700">${escapeHtml(r.profiles?.username||'')} ${badgeHtml(r.profiles?.subscription_plans)}</span><p style="font-size:13px;margin:2px 0">${escapeHtml(r.content)}</p></div>
    </div>`).join('')}
  </div>
  ${isSubscriber()?`<div class="reply-box"><input id="reply-input" placeholder="أضف رداً..."><button class="send-btn" onclick="submitReply('${p.id}')"><i class="ri-send-plane-fill"></i></button></div>`
  : `<div class="locked-banner" style="position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;border-radius:18px 18px 0 0"><p style="font-size:12.5px;margin:0">الرد متاح للمشتركين فقط</p></div>`}`;
});
async function submitReply(postId){
  if(!requireAuth()) return;
  const input = document.getElementById('reply-input'); const content = input.value.trim();
  if(!content) return;
  const {error} = await sb.from('forum_replies').insert({post_id:postId,user_id:state.user.id,content});
  if(error) return toast('تعذر الرد');
  input.value=''; renderRoute();
}
